sonar.projectKey=Andriiklymiuk_golden-cli
sonar.organization=corgi
sonar.projectName=golden-cli
sonar.sourceEncoding=UTF-8

sonar.sources=crates,xtask-conformance/src
# Vendored JS, generated/data fixtures, docs and non-source dirs are not analysed.
sonar.exclusions=**/target/**,crates/golden-core/src/sandbox/chai.js,**/*.md,plugins/**,packaging/**,dist/**,resources/**,.github/**,**/Cargo.lock

# Coverage from cargo-llvm-cov (see the coverage job in .github/workflows/golden-ci.yml).
sonar.rust.lcov.reportPaths=lcov.info
# Inline #[cfg(test)] modules + tests/ dirs are tests, not measured as covered code.
sonar.coverage.exclusions=**/tests/**,**/examples/**,crates/golden-core/src/sandbox/shims.rs
